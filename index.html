<!DOCTYPE html>
<html lang="en" class="dark">

    <meta charset="UTF-8" />

    <meta name="author" content="Jordy Bacherot" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jordybacherot.com/" />
    <meta property="og:title" content="Jordy Bacherot - Ingénieur IA & Sciences Cognitives" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://jordybacherot.com/" />
    <meta property="twitter:title" content="Jordy Bacherot - Ingénieur IA & Sciences Cognitives" />
    <meta property="twitter:description" content="Découvrez le portfolio de Jordy Bacherot : Expertises en IA générative (LLM, RAG), Sciences Cognitives et Développement Web." />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Jordy Bacherot",
        "jobTitle": "Ingénieur en Intelligence Artificielle",
        "url": "https://jordybacherot.com",
        "sameAs": [
          "https://www.linkedin.com/in/jordy-bacherot",
          "https://github.com/jordybacherot"
        ],
        "knowsAbout": ["Intelligence Artificielle", "Sciences Cognitives", "Machine Learning", "Deep Learning", "LLM", "RAG", "Développement Web", "React", "TypeScript"],
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Université de Lorraine"
        },
        "description": "Ingénieur spécialisé en Intelligence Artificielle et Sciences Cognitives, expert en solutions IA génératives (LLM, RAG)."
      }
    </script>
    <script>
      // Apply dark mode immediately to prevent flash
      // Check localStorage for user preference, default to dark mode
      const isDarkMode = localStorage.getItem("theme") !== "light";
      if (isDarkMode) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
